<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fizgrad - 个人主页" />
  <title>Fizgrad</title>
  <link rel="icon" href="assets/img/avatar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="grid-overlay" aria-hidden="true"></div>

  <a class="skip-link" href="#main" data-i18n="skip">跳到主内容</a>

  <header class="nav">
    <a href="#top" class="nav-logo">&lt;fizgrad/&gt;</a>
    <nav class="nav-links">
      <a href="#projects" data-i18n="navProjects">项目</a>
      <a href="#repos" data-i18n="navRepos">仓库</a>
      <a href="#blog" data-i18n="navBlog">博客</a>
      <a href="#recommend" data-i18n="navRec" class="nav-hide-sm">推荐</a>
      <a href="https://github.com/Fizgrad" target="_blank" rel="noopener" aria-label="GitHub" class="nav-github">
        <span class="nav-github-text">GitHub</span>
        <svg class="nav-github-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
      </a>
      <button id="lang-toggle" class="lang-btn" type="button" data-i18n="langBtn" data-i18n-aria="langBtnAria" aria-label="Switch to English">EN</button>
    </nav>
  </header>

  <main id="main">
    <section class="hero" id="top">
      <div class="hero-inner">
        <div class="avatar-wrap">
          <img src="assets/img/avatar.png" alt="Fizgrad avatar" class="avatar" loading="eager" />
          <span class="avatar-ring"></span>
        </div>
        <p class="hero-greet" data-i18n="greet">Hello, world. 我是</p>
        <h1 class="hero-name" data-text="David">David</h1>
        <p class="hero-tagline"><span class="prompt">$</span> <span id="typed"></span><span class="caret"></span></p>
        <ul class="socials">
          <li>
            <a href="https://github.com/Fizgrad" target="_blank" rel="noopener" aria-label="GitHub">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
              <span>GitHub</span>
            </a>
          </li>
          <li>
            <a href="mailto:davidchenms@hotmail.com" aria-label="Email">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M2 4h20a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm10 7L3.5 5.5h17L12 11zm0 2.3L3 6.4V18h18V6.4l-9 6.9z"/></svg>
              <span>Email</span>
            </a>
          </li>
         </ul>
        <div class="hero-scroll">
          <a href="#projects" data-i18n-aria="scrollAria" aria-label="向下滚动查看项目">
            <span class="mouse"><span class="wheel"></span></span>
            <span class="scroll-label" data-i18n="scroll">向下探索</span>
            <svg class="scroll-chev" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m6 9 6 6 6-6"/></svg>
          </a>
        </div>
      </div>
    </section>

    <section class="section" id="projects">
      <div class="section-head">
        <h2 class="section-title"><span class="hash">#</span> <span data-i18n="pagesTitle">GitHub Pages 项目</span></h2>
        <p class="section-sub" data-i18n="pagesSub">可直接访问的在线 Demo</p>
      </div>
      <div class="card-grid" id="pages-grid"></div>
    </section>

    <section class="section" id="repos">
      <div class="section-head">
        <h2 class="section-title"><span class="hash">#</span> <span data-i18n="reposTitle">更多仓库</span></h2>
        <p class="section-sub" data-i18n="reposSub">其他开源项目 · 点击前往 GitHub</p>
      </div>
      <div class="card-grid" id="repos-grid"></div>
    </section>

    <section class="section" id="blog">
      <div class="section-head">
        <h2 class="section-title"><span class="hash">#</span> <span data-i18n="blogTitle">博客</span></h2>
        <p class="section-sub" data-i18n="blogSub">所思所写</p>
      </div>
      <div class="card-grid" id="blog-grid"></div>
    </section>

    <section class="section" id="recommend">
      <div class="section-head">
        <h2 class="section-title"><span class="hash">#</span> <span data-i18n="recTitle">推荐</span></h2>
        <p class="section-sub" data-i18n="recSub">值得一看的站点</p>
      </div>
      <div class="card-grid" id="rec-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Fizgrad · Built with GLM-5.2</p>
    <a href="#top" class="back-top" data-i18n="backTop">回到顶部 ↑</a>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
